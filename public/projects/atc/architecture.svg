<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 600" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect x="0.5" y="0.5" width="639" height="599" rx="16" fill="#0b1120" stroke="#1e293b"/>
  <text x="320" y="34" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">ATC — Autonomous Person-Following Drone</text>

  <defs>
    <marker id="b" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <g stroke="#64748b" stroke-width="2" marker-end="url(#b)">
    <line x1="320" y1="108" x2="320" y2="150"/>
    <line x1="320" y1="214" x2="320" y2="262"/>
    <line x1="320" y1="326" x2="320" y2="374"/>
    <line x1="320" y1="438" x2="320" y2="486"/>
  </g>

  <g>
    <rect x="180" y="58" width="280" height="50" rx="10" fill="#0f172a" stroke="#38bdf8"/>
    <text x="320" y="88" text-anchor="middle" fill="#e2e8f0" font-size="14">📷 Onboard camera feed</text>
  </g>

  <g>
    <rect x="140" y="150" width="360" height="64" rx="10" fill="#0f172a" stroke="#a78bfa"/>
    <text x="320" y="177" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">YOLOv5 (trained on VisDrone) — RKNN / NPU</text>
    <text x="320" y="197" text-anchor="middle" fill="#94a3b8" font-size="11">Quantized ONNX → RKNN, running on RK3588 NPU in C++</text>
  </g>

  <g>
    <rect x="140" y="262" width="360" height="64" rx="10" fill="#0f172a" stroke="#38bdf8"/>
    <text x="320" y="289" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">ByteTrack</text>
    <text x="320" y="309" text-anchor="middle" fill="#94a3b8" font-size="11">Assigns a stable ID to the tracked person across frames</text>
  </g>

  <g>
    <rect x="140" y="374" width="360" height="64" rx="10" fill="#0f172a" stroke="#f472b6"/>
    <text x="320" y="401" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">MQTT broker</text>
    <text x="320" y="421" text-anchor="middle" fill="#94a3b8" font-size="11">Publishes target position; identical topics in sim &amp; real flight</text>
  </g>

  <g>
    <rect x="140" y="486" width="360" height="80" rx="10" fill="#0f172a" stroke="#4ade80"/>
    <text x="320" y="512" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">PID Controller → MAVSDK → PX4</text>
    <text x="320" y="532" text-anchor="middle" fill="#94a3b8" font-size="11">Python service converts target offset into velocity setpoints</text>
    <text x="320" y="550" text-anchor="middle" fill="#94a3b8" font-size="11">Same code path on PX4 SITL simulation and the real drone</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 600" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect x="0.5" y="0.5" width="639" height="599" rx="16" fill="#0b1120" stroke="#1e293b"/>

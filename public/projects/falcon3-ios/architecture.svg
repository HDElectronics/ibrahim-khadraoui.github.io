  </defs>
  <g stroke="#64748b" stroke-width="2" marker-end="url(#a)">
    <line x1="320" y1="108" x2="320" y2="150"/>
    <line x1="320" y1="214" x2="320" y2="262"/>
    <line x1="320" y1="342" x2="320" y2="390"/>

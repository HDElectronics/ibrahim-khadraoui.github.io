<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 560" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect x="0.5" y="0.5" width="639" height="559" rx="16" fill="#0b1120" stroke="#1e293b"/>
  <text x="320" y="34" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">VLA Data &amp; Evaluation Pipeline (in progress)</text>
  <text x="320" y="54" text-anchor="middle" fill="#64748b" font-size="11">Full write-up, photos and video coming soon</text>

  <defs>
    <marker id="c" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <g stroke="#64748b" stroke-width="2" marker-end="url(#c)">
    <line x1="320" y1="118" x2="320" y2="160"/>
    <line x1="320" y1="224" x2="320" y2="266"/>
    <line x1="320" y1="330" x2="320" y2="372"/>
    <line x1="320" y1="436" x2="320" y2="478"/>
  </g>

  <g>
    <rect x="160" y="68" width="320" height="50" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-dasharray="4 3"/>
    <text x="320" y="98" text-anchor="middle" fill="#e2e8f0" font-size="14">🤖 Mobile AI robot (Tossenrobotics) — teleop collection</text>
  </g>

  <g>
    <rect x="160" y="160" width="320" height="64" rx="10" fill="#0f172a" stroke="#a78bfa" stroke-dasharray="4 3"/>
    <text x="320" y="187" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Collection + conversion tooling</text>
    <text x="320" y="207" text-anchor="middle" fill="#94a3b8" font-size="11">Custom scripts turn raw episodes into a training-ready format</text>
  </g>

  <g>
    <rect x="160" y="266" width="320" height="64" rx="10" fill="#0f172a" stroke="#f472b6" stroke-dasharray="4 3"/>
    <text x="320" y="293" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Upload to training cluster</text>
    <text x="320" y="313" text-anchor="middle" fill="#94a3b8" font-size="11">Dataset handed off to the training team</text>
  </g>

  <g>
    <rect x="160" y="372" width="320" height="64" rx="10" fill="#0f172a" stroke="#facc15" stroke-dasharray="4 3"/>
    <text x="320" y="399" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">VLA training</text>
    <text x="320" y="419" text-anchor="middle" fill="#94a3b8" font-size="11">Run by the training team on the collected dataset</text>
  </g>

  <g>
    <rect x="160" y="478" width="320" height="64" rx="10" fill="#0f172a" stroke="#4ade80" stroke-dasharray="4 3"/>
    <text x="320" y="505" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Checkpoint download + evaluation</text>
    <text x="320" y="525" text-anchor="middle" fill="#94a3b8" font-size="11">Tooling to pull checkpoints back and run inference/eval</text>
  </g>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect x="0.5" y="0.5" width="639" height="459" rx="16" fill="#0b1120" stroke="#1e293b"/>
  <text x="320" y="34" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">FreeRTOS on ESP32 — Two Tasks, Two Mutexes</text>

  <defs>
    <marker id="e" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <g stroke="#64748b" stroke-width="2" marker-end="url(#e)">
    <line x1="160" y1="100" x2="270" y2="180"/>
    <line x1="480" y1="100" x2="370" y2="180"/>
    <line x1="320" y1="244" x2="320" y2="290"/>
    <line x1="320" y1="354" x2="320" y2="396"/>
  </g>

  <g>
    <rect x="60" y="58" width="200" height="50" rx="10" fill="#0f172a" stroke="#38bdf8"/>
    <text x="160" y="88" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">BlinkTask (1000ms)</text>
  </g>

  <g>
    <rect x="380" y="58" width="200" height="50" rx="10" fill="#0f172a" stroke="#38bdf8"/>
    <text x="480" y="88" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">BlinkFastTask (250ms)</text>
  </g>

  <g>
    <rect x="160" y="180" width="320" height="64" rx="10" fill="#0f172a" stroke="#a78bfa"/>
    <text x="320" y="207" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">ledMutex + serialMutex</text>
    <text x="320" y="227" text-anchor="middle" fill="#94a3b8" font-size="11">xSemaphoreTake / xSemaphoreGive — same order every time</text>
  </g>

  <g>
    <rect x="160" y="290" width="320" height="64" rx="10" fill="#0f172a" stroke="#f472b6"/>
    <text x="320" y="317" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Shared resources</text>
    <text x="320" y="337" text-anchor="middle" fill="#94a3b8" font-size="11">GPIO 2 (LED) · Serial port (115200 baud)</text>
  </g>

  <g>
    <rect x="140" y="396" width="360" height="48" rx="10" fill="#0f172a" stroke="#4ade80"/>
    <text x="320" y="425" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Both tasks pinned to Core 1 — clean, non-interleaved output</text>
  </g>
</svg>
